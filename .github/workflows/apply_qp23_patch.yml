name: Apply NVENC QP 23 patch

on:
  push:
    branches:
      - feature/configurable-constant-qp

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/configurable-constant-qp
          fetch-depth: 0

      - name: Set all constant-QP frame types to 23
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/backend/nvenc/NvencCommon.cpp")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "encodeConfig.rcParams.constQP.qpInterP = 20;": "encodeConfig.rcParams.constQP.qpInterP = 23;",
              "encodeConfig.rcParams.constQP.qpInterB = 22;": "encodeConfig.rcParams.constQP.qpInterB = 23;",
              "encodeConfig.rcParams.constQP.qpIntra = 18;": "encodeConfig.rcParams.constQP.qpIntra = 23;",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected source line was not found: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/nvenc/NvencCommon.cpp
          git commit -m "Set NVENC constant QP to 23"
          git push origin HEAD:feature/configurable-constant-qp
